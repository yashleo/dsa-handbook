<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Interview Handbook — 60 Day Sprint</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0d1b2a; --paper:#f7f4ee;
  --grape:#5b2a86; --grape-2:#7b3fb0;
  --lime:#2ec4a6; --lime-2:#12a389;
  --sun:#ffb020; --sun-2:#f79009;
  --coral:#ff5d73; --coral-2:#e63950;
  --sky:#3b82f6; --sky-2:#2563eb;
  --slate:#5b677a; --line:rgba(255,255,255,.35);
  --font-d:'Space Grotesk',sans-serif;
  --font-b:'Inter',sans-serif;
  --font-m:'JetBrains Mono',monospace;
  /* semantic surfaces (flip in dark) */
  --side-bg:rgba(13,27,42,.82); --side-fg:#dfe6ef; --side-muted:#8fa0b5; --side-item:#b9c4d2; --side-hover:rgba(255,255,255,.07);
  --track:#e9e4da; --code-bg:#97baff49; --code-fg:inherit;
  --row-hover:rgba(255,255,255,.45); --body-fg:#0d1b2a;
  --clue-bg:#f0ecf7; --clue-fg:#5b2a86;
  --byes-bg:#e7f9f2; --bno-bg:#fff1e8; --btrap-bg:#ffe9ed; --btree-bg:#f2effa;
  --td-fg:#33414f; --pre-bg:#0d1b2a; --pre-fg:#e2e8f0;
  --warm-card:rgba(255,247,230,.72); --warm-border:rgba(255,225,166,.6);
  --grape-card:rgba(242,239,250,.72); --grape-border:rgba(221,208,238,.65);
  --green-card:rgba(231,249,242,.72); --green-border:rgba(191,238,218,.65);
  --mini-shadow:var(--shadow);
  --badge-bg:#0d1b2a; --badge-fg:#fff;
  --pill-easy-bg:#d7f7ec; --pill-med-bg:#fff0d6; --pill-hard-bg:#ffe0e5; --pill-tag-bg:#ede4f7;
  --accent-sun-bg:#fff0d6; --accent-sky-bg:#dbeafe; --accent-coral-bg:#ffe0e5;
  --accent-green-bg:#d7f7ec; --accent-grape-bg:#ede4f7; --accent-neutral-bg:#e6e0d6;
  --input-bg:var(--panel); --input-fg:var(--body-fg);
  /* glass + glow */
  --panel-solid:#ffffff;
  --panel:rgba(255,255,255,.72);
  --glass-blur:18px;
  --glass-border:rgba(255,255,255,.55);
  --glass-border-soft:rgba(255,255,255,.28);
  --glass-divider:rgba(13,27,42,.07);
  --glass-shine:inset 0 1px 0 rgba(255,255,255,.65);
  --glow-grape:0 0 22px rgba(123,63,176,.22);
  --glow-lime:0 0 18px rgba(46,196,166,.28);
  --glow-sun:0 0 18px rgba(255,176,32,.22);
  --glow-sky:0 0 18px rgba(59,130,246,.2);
  --glow-hover:0 0 28px rgba(123,63,176,.14);
  --shadow:0 10px 36px -12px rgba(13,27,42,.18),var(--glass-shine);
  --bg-mesh:
    radial-gradient(ellipse 90% 60% at 8% -8%,rgba(123,63,176,.14),transparent 55%),
    radial-gradient(ellipse 70% 50% at 96% 4%,rgba(46,196,166,.12),transparent 50%),
    radial-gradient(ellipse 60% 45% at 50% 105%,rgba(255,176,32,.1),transparent 55%),
    radial-gradient(ellipse 50% 40% at 72% 68%,rgba(59,130,246,.08),transparent 50%);
}
[data-theme="dark"]{
  --ink:#e8edf3; --paper:#0a0e14; --panel-solid:#1a222d;
  --panel:rgba(22,30,42,.78);
  --grape:#b98fe0; --grape-2:#9d6fd0;
  --lime:#34d3b2; --lime-2:#3fe0bd;
  --sun:#ffc247; --sun-2:#ffb020;
  --coral:#ff7d8f; --coral-2:#ff6178;
  --sky:#5c9bff; --sky-2:#7db0ff;
  --slate:#93a2b5; --line:rgba(255,255,255,.08);
  --side-bg:rgba(7,11,17,.88); --side-fg:#dfe6ef; --side-muted:#7b8ba3; --side-item:#aeb9c8; --side-hover:rgba(255,255,255,.06);
  --track:#2b3543; --code-bg:#243040; --code-fg:#d7e0ec;
  --row-hover:rgba(255,255,255,.04); --body-fg:#e8edf3;
  --clue-bg:#2a2340; --clue-fg:#c7aef0;
  --byes-bg:#123027; --bno-bg:#33220f; --btrap-bg:#331a20; --btree-bg:#241f34;
  --td-fg:#b7c2d0; --pre-bg:#070b11; --pre-fg:#e2e8f0;
  --warm-card:rgba(43,36,17,.75); --warm-border:rgba(74,61,24,.8);
  --grape-card:rgba(36,31,52,.78); --grape-border:rgba(58,47,82,.85);
  --green-card:rgba(18,48,39,.78); --green-border:rgba(31,74,59,.85);
  --badge-bg:#243040; --badge-fg:#e8edf3;
  --pill-easy-bg:#123027; --pill-med-bg:#33220f; --pill-hard-bg:#331a20; --pill-tag-bg:#2a2340;
  --accent-sun-bg:#33220f; --accent-sky-bg:#1a2840; --accent-coral-bg:#331a20;
  --accent-green-bg:#123027; --accent-grape-bg:#2a2340; --accent-neutral-bg:#243040;
  --input-bg:rgba(26,34,45,.85); --input-fg:#e8edf3;
  --glass-border:rgba(255,255,255,.1);
  --glass-border-soft:rgba(255,255,255,.05);
  --glass-divider:rgba(255,255,255,.06);
  --glass-shine:inset 0 1px 0 rgba(255,255,255,.08);
  --glow-grape:0 0 26px rgba(185,143,224,.18);
  --glow-lime:0 0 22px rgba(52,211,178,.22);
  --glow-sun:0 0 20px rgba(255,194,71,.16);
  --glow-sky:0 0 20px rgba(92,155,255,.16);
  --glow-hover:0 0 32px rgba(185,143,224,.12);
  --shadow:0 14px 40px -14px rgba(0,0,0,.55),var(--glass-shine);
  --bg-mesh:
    radial-gradient(ellipse 90% 60% at 8% -8%,rgba(157,111,208,.16),transparent 55%),
    radial-gradient(ellipse 70% 50% at 96% 4%,rgba(52,211,178,.1),transparent 50%),
    radial-gradient(ellipse 60% 45% at 50% 105%,rgba(255,176,32,.07),transparent 55%),
    radial-gradient(ellipse 50% 40% at 72% 68%,rgba(92,155,255,.08),transparent 50%);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--paper);background-image:var(--bg-mesh);background-attachment:fixed;color:var(--body-fg);font-family:var(--font-b);line-height:1.55;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}
a{color:var(--sky-2);text-decoration:none}
a:hover{text-decoration:underline}
code{font-family:var(--font-m);background:var(--code-bg);color:var(--code-fg);padding:1px 6px;border-radius:5px;font-size:.85em;border:1px solid var(--glass-border-soft)}

/* glass utility */
.glass{background:var(--panel);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border:1px solid var(--glass-border);box-shadow:var(--shadow);transition:box-shadow .25s,border-color .25s,transform .25s}
.glass:hover{box-shadow:var(--shadow),var(--glow-hover);border-color:var(--glass-border)}

/* ===== layout ===== */
.wrap{display:flex;min-height:100vh}
.side{width:230px;flex-shrink:0;background:var(--side-bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);color:var(--side-fg);position:sticky;top:0;height:100vh;overflow-y:auto;padding:22px 14px;border-right:1px solid var(--glass-border-soft);box-shadow:4px 0 40px rgba(0,0,0,.12),var(--glow-grape)}
.brand{font-family:var(--font-d);font-weight:700;font-size:1.15rem;color:#fff;line-height:1.2;margin-bottom:2px;text-shadow:0 0 20px rgba(255,176,32,.35)}
.brand span{color:var(--sun);filter:drop-shadow(0 0 8px rgba(255,176,32,.45))}
.brand-sub{font-size:.72rem;color:var(--side-muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:20px}
.nav a{display:flex;align-items:center;gap:9px;color:var(--side-item);padding:9px 11px;border-radius:9px;font-size:.86rem;font-weight:500;margin-bottom:2px;cursor:pointer;transition:.2s;border:1px solid transparent}
.nav a:hover{background:var(--side-hover);color:#fff;text-decoration:none;border-color:var(--glass-border-soft);box-shadow:var(--glow-grape)}
.nav a.active{background:linear-gradient(90deg,rgba(123,63,176,.85),rgba(91,42,134,.9));color:#fff;border-color:rgba(255,255,255,.15);box-shadow:var(--glow-grape),inset 0 1px 0 rgba(255,255,255,.12)}
.nav .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 10px currentColor}
.main{flex:1;min-width:0}
.topbar{background:var(--panel);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border-bottom:1px solid var(--glass-border);padding:14px 34px;position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:16px;box-shadow:0 8px 32px rgba(0,0,0,.08),var(--glass-shine)}
.topbar h1{font-family:var(--font-d);font-size:1.15rem;font-weight:600}
.prog-mini{display:flex;align-items:center;gap:10px;font-size:.8rem;color:var(--slate);font-weight:500}
.prog-mini .bar{width:150px;height:9px;background:rgba(255,255,255,.15);border:1px solid var(--glass-border-soft);border-radius:20px;overflow:hidden;box-shadow:inset 0 1px 4px rgba(0,0,0,.08)}
.prog-mini .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--lime),var(--lime-2));width:0;transition:width .4s;box-shadow:0 0 12px rgba(46,196,166,.55)}
.theme-toggle{margin-left:6px;width:34px;height:34px;border-radius:50%;border:1px solid var(--glass-border);background:var(--panel);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:var(--body-fg);font-size:1rem;cursor:pointer;display:grid;place-items:center;transition:.2s;line-height:1;box-shadow:var(--shadow)}
.theme-toggle:hover{transform:scale(1.08);border-color:var(--grape-2);box-shadow:var(--shadow),var(--glow-grape)}
.theme-toggle:active{transform:scale(.94)}
.content{padding:30px 34px 90px;max-width:1120px}
.page{display:none;animation:fade .3s ease}
.page.show{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ===== cards / typography ===== */
.eyebrow{font-family:var(--font-m);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--grape-2);font-weight:700;margin-bottom:7px;text-shadow:0 0 16px rgba(123,63,176,.2)}
.h-lead{font-family:var(--font-d);font-size:1.9rem;font-weight:700;line-height:1.1;margin-bottom:8px}
.lead-txt{color:var(--slate);max-width:680px;margin-bottom:24px}
.card{background:var(--panel);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border:1px solid var(--glass-border);border-radius:16px;padding:22px;box-shadow:var(--shadow);margin-bottom:18px;transition:box-shadow .25s,border-color .25s,transform .25s}
.card:hover{box-shadow:var(--shadow),var(--glow-hover);border-color:var(--glass-border)}
.card h3{font-family:var(--font-d);font-size:1.1rem;margin-bottom:6px}
h2.sec{font-family:var(--font-d);font-size:1.35rem;margin:30px 0 14px;display:flex;align-items:center;gap:10px}
h2.sec::before{content:"";width:6px;height:24px;border-radius:6px;background:var(--sun);box-shadow:0 0 14px rgba(255,176,32,.5)}

/* hero grid */
.hero{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;margin-bottom:8px}
.hero-main{background:linear-gradient(135deg,rgba(91,42,134,.88),rgba(61,26,94,.92));backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);color:#fff;border-radius:20px;padding:30px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.14);box-shadow:0 20px 60px rgba(91,42,134,.35),var(--glow-grape),inset 0 1px 0 rgba(255,255,255,.15)}
.hero-main::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 20% 20%,rgba(255,255,255,.12),transparent 45%);pointer-events:none}
.hero-main::after{content:"{ }";position:absolute;right:-8px;bottom:-30px;font-family:var(--font-m);font-size:11rem;font-weight:700;color:rgba(255,255,255,.07)}
.hero-main .eyebrow{color:var(--sun);filter:drop-shadow(0 0 10px rgba(255,176,32,.4))}
.hero-main h2{font-family:var(--font-d);font-size:2.1rem;line-height:1.05;margin-bottom:10px;text-shadow:0 0 30px rgba(255,255,255,.12)}
.hero-main p{color:#e3d5f2;max-width:420px}
.stat-col{display:grid;gap:14px}
.stat{background:var(--panel);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border:1px solid var(--glass-border);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow);transition:box-shadow .25s,transform .25s}
.stat:hover{box-shadow:var(--shadow),var(--glow-hover);transform:translateY(-2px)}
.stat .n{font-family:var(--font-d);font-size:1.7rem;font-weight:700}
.stat .l{font-size:.78rem;color:var(--slate);text-transform:uppercase;letter-spacing:.06em}
.stat.g .n{color:var(--lime-2);text-shadow:0 0 18px rgba(46,196,166,.35)} .stat.o .n{color:var(--sun-2);text-shadow:0 0 18px rgba(255,176,32,.3)} .stat.c .n{color:var(--coral-2);text-shadow:0 0 18px rgba(230,57,80,.25)}

.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.mini{background:var(--panel);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border:1px solid var(--glass-border);border-radius:14px;padding:18px;box-shadow:var(--shadow);transition:box-shadow .25s,transform .25s}
.mini:hover{box-shadow:var(--shadow),var(--glow-hover);transform:translateY(-2px)}
.mini .ic{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:1.1rem;margin-bottom:10px;border:1px solid var(--glass-border-soft)}
.ic-sun{background:var(--accent-sun-bg);box-shadow:var(--glow-sun)}
.ic-sky{background:var(--accent-sky-bg);box-shadow:var(--glow-sky)}
.ic-coral{background:var(--accent-coral-bg);box-shadow:0 0 16px rgba(255,93,115,.2)}
.mini h4{font-family:var(--font-d);font-size:1rem;margin-bottom:4px}
.mini p{font-size:.85rem;color:var(--slate)}

.pill{display:inline-block;font-size:.7rem;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;border:1px solid var(--glass-border-soft);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.p-easy{background:var(--pill-easy-bg);color:var(--lime-2);box-shadow:var(--glow-lime)}
.p-med{background:var(--pill-med-bg);color:var(--sun-2);box-shadow:var(--glow-sun)}
.p-hard{background:var(--pill-hard-bg);color:var(--coral-2);box-shadow:0 0 14px rgba(255,93,115,.2)}
.p-tag{background:var(--pill-tag-bg);color:var(--grape);box-shadow:var(--glow-grape)}

/* week accordion */
.week{border:1px solid var(--glass-border);border-radius:14px;margin-bottom:12px;overflow:hidden;background:var(--panel);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));box-shadow:var(--shadow);transition:box-shadow .25s}
.week:hover{box-shadow:var(--shadow),var(--glow-hover)}
.week-head{padding:15px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;font-family:var(--font-d);font-weight:600}
.week-head .wk-badge{font-family:var(--font-m);font-size:.72rem;color:#fff;background:linear-gradient(135deg,var(--grape-2),var(--grape));padding:4px 9px;border-radius:8px;box-shadow:var(--glow-grape);border:1px solid rgba(255,255,255,.12)}
.week-head .wk-theme{color:var(--slate);font-weight:400;font-family:var(--font-b);font-size:.85rem;margin-left:auto}
.week-head .chev{transition:.2s;color:var(--slate)}
.week.open .chev{transform:rotate(90deg)}
.week-body{display:none;padding:4px 18px 18px}
.week.open .week-body{display:block}
.day{border-left:3px solid var(--sun);padding:12px 0 12px 16px;margin:12px 0;position:relative;filter:drop-shadow(0 0 8px rgba(255,176,32,.15))}
.day-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.day-num{font-family:var(--font-m);font-weight:700;font-size:.8rem;background:var(--badge-bg);color:var(--badge-fg);padding:3px 9px;border-radius:7px;border:1px solid var(--glass-border-soft);box-shadow:0 0 12px rgba(13,27,42,.2),inset 0 1px 0 rgba(255,255,255,.08)}
.day-title{font-family:var(--font-d);font-weight:600}
.day-time{margin-left:auto;font-size:.75rem;color:var(--slate);font-family:var(--font-m)}
.day dl{font-size:.87rem;margin-top:4px}
.day dt{font-weight:600;color:var(--grape);margin-top:7px;font-size:.8rem;text-transform:uppercase;letter-spacing:.03em}
.day dd{color:var(--td-fg);margin-bottom:2px}
.day .chk{margin-right:8px;accent-color:var(--lime-2);width:16px;height:16px;vertical-align:-3px;cursor:pointer}

/* pattern cards */
.pat{border:1px solid var(--glass-border);border-radius:14px;background:var(--panel);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;transition:box-shadow .25s,border-color .25s}
.pat:hover,.pat.open{box-shadow:var(--shadow),var(--glow-hover);border-color:var(--glass-border)}
.pat-head{padding:16px 20px;cursor:pointer;display:flex;align-items:center;gap:12px}
.pat-head .tag{width:44px;height:44px;border-radius:11px;display:grid;place-items:center;font-size:1.3rem;flex-shrink:0;border:1px solid var(--glass-border-soft)}
.tag-sky{background:var(--accent-sky-bg);color:var(--sky-2);box-shadow:var(--glow-sky)}
.tag-lime{background:var(--accent-green-bg);color:var(--lime-2);box-shadow:var(--glow-lime)}
.tag-grape{background:var(--accent-grape-bg);color:var(--grape-2);box-shadow:var(--glow-grape)}
.tag-sun{background:var(--accent-sun-bg);color:var(--sun-2);box-shadow:var(--glow-sun)}
.tag-coral{background:var(--accent-coral-bg);color:var(--coral-2);box-shadow:0 0 14px rgba(255,93,115,.2)}
.tag-neutral{background:var(--accent-neutral-bg);color:var(--body-fg)}
.pat-head h4{font-family:var(--font-d);font-size:1.05rem}
.pat-head .kw{font-size:.78rem;color:var(--slate)}
.pat-head .chev{margin-left:auto;color:var(--slate);transition:.2s}
.pat.open .chev{transform:rotate(90deg)}
.pat-body{display:none;padding:0 20px 20px}
.pat.open .pat-body{display:block}
.clue-wrap{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 14px}
.clue{background:var(--clue-bg);color:var(--clue-fg);font-size:.76rem;font-weight:500;padding:4px 10px;border-radius:8px;font-family:var(--font-m);border:1px solid var(--glass-border-soft);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:var(--glow-grape)}
.block{border-radius:10px;padding:12px 14px;margin:8px 0;font-size:.86rem;color:var(--td-fg);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--glass-border-soft)}
.block b{display:block;margin-bottom:3px;font-family:var(--font-d);font-size:.82rem}
.b-yes{background:var(--byes-bg);border-left:3px solid var(--lime-2);box-shadow:var(--glow-lime)}
.b-no{background:var(--bno-bg);border-left:3px solid var(--sun-2);box-shadow:var(--glow-sun)}
.b-trap{background:var(--btrap-bg);border-left:3px solid var(--coral-2);box-shadow:0 0 14px rgba(255,93,115,.15)}
.b-tree{background:var(--btree-bg);border-left:3px solid var(--grape);box-shadow:var(--glow-grape)}
.pat-body .practice{font-size:.85rem;margin-top:8px;color:var(--td-fg)}

/* tables */
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;font-family:var(--font-d);font-size:.75rem;text-transform:uppercase;letter-spacing:.04em;color:var(--slate);padding:10px 10px;border-bottom:2px solid var(--glass-divider)}
td{padding:9px 10px;border-bottom:1px solid var(--glass-divider);vertical-align:top;color:var(--body-fg)}
tr:hover td{background:var(--row-hover)}
.tbl-wrap{overflow-x:auto;background:var(--panel);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border:1px solid var(--glass-border);border-radius:14px;box-shadow:var(--shadow);transition:box-shadow .25s}
.tbl-wrap:hover{box-shadow:var(--shadow),var(--glow-hover)}
td code{font-size:.8rem}

/* code blocks */
pre{background:color-mix(in srgb,var(--pre-bg) 88%,transparent);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:var(--pre-fg);border-radius:12px;padding:16px 18px;overflow-x:auto;font-family:var(--font-m);font-size:.8rem;line-height:1.6;margin:8px 0;border:1px solid var(--glass-border-soft);box-shadow:0 12px 40px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.06)}
pre .cm{color:#7b8ba3} pre .kw{color:#ff9e64} pre .fn{color:#7dd3fc} pre .st{color:#a5e887}
.tmpl-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.tmpl-tab{font-family:var(--font-m);font-size:.78rem;padding:6px 13px;border-radius:9px;border:1px solid var(--glass-border);background:var(--panel);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:var(--body-fg);cursor:pointer;font-weight:500;transition:box-shadow .2s,border-color .2s}
.tmpl-tab:hover{box-shadow:var(--glow-hover)}
.tmpl-tab.active{background:var(--badge-bg);color:var(--badge-fg);border-color:var(--glass-border);box-shadow:0 0 16px rgba(13,27,42,.25),inset 0 1px 0 rgba(255,255,255,.08)}
.tmpl-panel{display:none} .tmpl-panel.show{display:block}
.copy-btn{float:right;font-size:.72rem;font-family:var(--font-m);background:linear-gradient(135deg,var(--grape-2),var(--grape));color:#fff;border:1px solid rgba(255,255,255,.12);padding:5px 11px;border-radius:7px;cursor:pointer;margin-bottom:4px;box-shadow:var(--glow-grape);transition:box-shadow .2s,transform .2s}
.copy-btn:hover{background:var(--grape);box-shadow:var(--glow-grape),0 0 24px rgba(123,63,176,.35);transform:translateY(-1px)}
.lang-tabs{display:flex;gap:6px;margin-bottom:10px}
.lang-tab{font-family:var(--font-d);font-size:.8rem;font-weight:600;padding:7px 16px;border-radius:9px 9px 0 0;border:1px solid var(--glass-border);background:var(--panel);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:var(--slate);cursor:pointer;transition:.2s;border-bottom:none}
.lang-tab:hover{color:var(--body-fg)}
.lang-tab.active{background:var(--badge-bg);color:var(--badge-fg);box-shadow:0 0 16px rgba(13,27,42,.2)}

/* decision tree */
.tree{background:var(--panel);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border:1px solid var(--glass-border);border-radius:16px;padding:20px;box-shadow:var(--shadow);overflow-x:auto;transition:box-shadow .25s}
.tree:hover{box-shadow:var(--shadow),var(--glow-lime)}
.tnode{font-family:var(--font-m);font-size:.85rem;color:var(--body-fg)}
.tq{background:color-mix(in srgb,var(--pre-bg) 90%,transparent);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:var(--pre-fg);padding:8px 14px;border-radius:10px;display:inline-block;font-weight:500;margin:6px 0;border:1px solid var(--glass-border-soft);box-shadow:0 0 16px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.08)}
.tbranch{margin-left:26px;border-left:2px dashed var(--glass-border-soft);padding-left:18px}
.tans{background:var(--byes-bg);color:var(--lime-2);padding:6px 12px;border-radius:8px;display:inline-block;font-weight:700;margin:5px 0;border:1px solid var(--green-border);box-shadow:var(--glow-lime);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.tguard{color:var(--slate);font-size:.8rem}

/* tracker */
.tracker-tools{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.btn{font-family:var(--font-d);font-weight:600;font-size:.82rem;border:1px solid rgba(255,255,255,.12);padding:9px 16px;border-radius:10px;cursor:pointer;color:#fff;background:linear-gradient(135deg,var(--grape-2),var(--grape));box-shadow:var(--glow-grape);transition:box-shadow .2s,transform .2s}
.btn:hover{box-shadow:var(--glow-grape),0 0 28px rgba(123,63,176,.35);transform:translateY(-1px)}
.btn.ghost{background:var(--panel);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:var(--body-fg);border:1px solid var(--glass-border);box-shadow:var(--shadow)}
.btn.ghost:hover{box-shadow:var(--shadow),var(--glow-hover)}
select.btn.ghost{background:var(--input-bg);color:var(--input-fg)}
.btn.danger{background:linear-gradient(135deg,var(--coral-2),var(--coral));box-shadow:0 0 18px rgba(255,93,115,.25)}
.btn.danger:hover{box-shadow:0 0 28px rgba(255,93,115,.35)}
.trk-in,.note-in{background:var(--input-bg);color:var(--input-fg);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--glass-border-soft)}
.trk-in{width:44px;text-align:center;border-radius:7px;padding:5px;font-family:var(--font-m);font-size:.82rem}
.conf{display:flex;gap:3px}
.conf span{cursor:pointer;font-size:1rem;filter:grayscale(1);opacity:.4;transition:.15s}
.conf span.on{filter:none;opacity:1;text-shadow:0 0 10px rgba(255,194,71,.6)}
.note-in{width:100%;border-radius:7px;padding:5px 8px;font-size:.8rem;font-family:var(--font-b)}
.ring{width:120px;height:120px;filter:drop-shadow(0 0 12px rgba(46,196,166,.35))}
.ring circle{fill:none;stroke-width:12}
.ring .bg{stroke:var(--track)}
.ring .fg{stroke:var(--lime-2);stroke-linecap:round;transition:stroke-dashoffset .5s;filter:drop-shadow(0 0 6px rgba(46,196,166,.5))}
.dash-row{display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:center;margin-bottom:18px}

/* checklist */
.check-list{list-style:none}
.check-list li{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--glass-divider);font-size:.9rem}
.check-list li:last-child{border:none}
.check-list input{accent-color:var(--lime-2);width:17px;height:17px;flex-shrink:0;margin-top:2px;cursor:pointer}
.mistake-cat{margin-bottom:8px}
.mistake-cat summary{cursor:pointer;font-family:var(--font-d);font-weight:600;padding:11px 15px;background:var(--panel);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border:1px solid var(--glass-border);border-radius:11px;list-style:none;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);transition:box-shadow .2s}
.mistake-cat summary:hover{box-shadow:var(--shadow),var(--glow-hover)}
.mistake-cat summary::-webkit-details-marker{display:none}
.mistake-cat summary .cnt{margin-left:auto;font-family:var(--font-m);font-size:.75rem;color:var(--slate)}
.mistake-cat[open] summary{border-radius:11px 11px 0 0;box-shadow:var(--shadow),var(--glow-grape)}
.mistake-cat ol{background:var(--panel);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border:1px solid var(--glass-border);border-top:none;border-radius:0 0 11px 11px;padding:12px 12px 12px 34px;font-size:.85rem}
.mistake-cat li{padding:3px 0;color:var(--td-fg)}

.footer{text-align:center;color:var(--slate);font-size:.78rem;padding:20px}
.mobile-nav{display:none}
@media(max-width:860px){
  .side{display:none}
  .wrap{flex-direction:column}
  .hero{grid-template-columns:1fr}
  .grid-3,.grid-2{grid-template-columns:1fr}
  .content{padding:18px 16px 80px}
  .topbar{padding:12px 16px}
  .mobile-nav{display:block;position:sticky;top:53px;z-index:19;background:var(--panel);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border-bottom:1px solid var(--glass-border);padding:8px 12px;overflow-x:auto;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.1),var(--glass-shine)}
  .mobile-nav a{display:inline-block;font-size:.8rem;padding:6px 12px;border-radius:8px;color:var(--slate);font-weight:600;border:1px solid transparent;transition:.2s}
  .mobile-nav a.active{background:linear-gradient(135deg,var(--grape-2),var(--grape));color:#fff;box-shadow:var(--glow-grape);border-color:rgba(255,255,255,.12)}
  .prog-mini .bar{width:80px}
}
@supports not ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))){
  .card,.mini,.stat,.week,.pat,.tbl-wrap,.tree,.topbar,.side,.mistake-cat summary,.mistake-cat ol,.mobile-nav{background:var(--panel-solid)}
}
</style>
</head>

<script>
/* ============================================================

// ---- 60-day roadmap (weeks -> days) ----
const WEEKS = [
 {wk:1, theme:"Foundations: Arrays, Strings, Hashing", days:[
   {n:1,t:"Arrays & Complexity Mindset",time:"1.5h",theory:"How arrays sit in memory, contiguous indexing, why access is O(1) and insertion/deletion O(n). Big-O, Big-Ω, amortized cost.",obs:"Almost every problem starts as an array. Master traversal + in-place edits before anything else.",mist:"Modifying an array while iterating; assuming .length is O(n).",practice:"LC 1 Two Sum · LC 121 Best Time to Buy/Sell Stock · LC 26 Remove Duplicates",rev:"—",notes:"Say your complexity out loud on every solve from Day 1."},
   {n:2,t:"HashMap & HashSet",time:"1.5h",theory:"Hashing, collision handling, load factor. C++ unordered_map/unordered_set API: count(), find(), insert(), erase().",obs:"'Have I seen this before?' and 'how many times?' → unordered_map. It converts O(n²) scans to O(n).",mist:"Key type must be hashable; forgetting to check count() before access.",practice:"LC 217 Contains Duplicate · LC 242 Valid Anagram · LC 49 Group Anagrams",rev:"—",notes:"Frequency map is the single most reused pattern in interviews."},
   {n:3,t:"Strings Fundamentals",time:"1.5h",theory:"Immutability of String, StringBuilder, char[] tricks, ASCII arithmetic (int[26]).",obs:"Anagram / frequency problems → int[26] beats HashMap on speed.",mist:"String concatenation in loops (O(n²)); off-by-one on substrings.",practice:"LC 125 Valid Palindrome · LC 344 Reverse String · LC 387 First Unique Char",rev:"—",notes:"Prefer char[] and StringBuilder; never '+=' in a loop."},
   {n:4,t:"Two Pointers",time:"1.5h",theory:"Opposite-ends and same-direction pointers. Works on sorted arrays and strings.",obs:"'Pair that sums to X' on a sorted array → two pointers, O(n) no extra space.",mist:"Moving the wrong pointer; not sorting when required.",practice:"LC 167 Two Sum II · LC 15 3Sum · LC 11 Container With Most Water",rev:"—",notes:"3Sum = sort + fix one + two pointers. Memorize the skip-duplicates trick."},
   {n:5,t:"Sliding Window",time:"1.5h",theory:"Fixed vs variable window. Expand right, shrink left while a condition breaks.",obs:"'Longest/shortest contiguous subarray/substring with property' → sliding window.",mist:"Recomputing the window from scratch instead of updating incrementally.",practice:"LC 3 Longest Substring No Repeat · LC 209 Min Size Subarray Sum · LC 76 Min Window Substring(read)",rev:"—",notes:"Template: while(bad) shrink; then update answer."},
   {n:6,t:"Prefix Sum & Difference Array",time:"1.5h",theory:"Precompute cumulative sums for O(1) range queries; difference array for range updates.",obs:"'Sum of range' repeatedly, or 'subarray sums to K' → prefix sum + HashMap.",mist:"Off-by-one on prefix indices; forgetting the empty-prefix (0) entry.",practice:"LC 303 Range Sum · LC 560 Subarray Sum Equals K · LC 1109 Corporate Flight Bookings",rev:"—",notes:"prefix[0]=0 seeded in map is what makes 560 work."},
   {n:7,t:"REVISION + Mixed Set",time:"1.5h",theory:"No new theory. Re-solve without looking. Build your own notes page.",obs:"If you can't derive Day 1–6 solutions cold, repeat them before moving on.",mist:"Passive re-reading instead of active re-solving.",practice:"Re-solve 2 hardest from each of Days 1–6 from a blank editor.",rev:"Revise Days 1–6",notes:"Checkpoint 1: you should solve easy array/string/hash problems in <15 min."},
 ]},
 {wk:2, theme:"Searching, Sorting, Recursion", days:[
   {n:8,t:"Binary Search (on arrays)",time:"1.5h",theory:"lo/hi/mid, closed vs half-open intervals. lower_bound / upper_bound.",obs:"Sorted + 'find / first / last / insert position' → binary search.",mist:"mid=(lo+hi)/2 overflow → use lo+(hi-lo)/2; infinite loops from wrong boundary update.",practice:"LC 704 Binary Search · LC 34 First/Last Position · LC 35 Search Insert",rev:"—",notes:"Pick ONE template and use it forever. Consistency kills bugs."},
   {n:9,t:"Binary Search on Answer",time:"1.5h",theory:"Search the answer space when a monotonic feasibility check exists.",obs:"'Minimize the maximum / maximize the minimum', 'K days', 'capacity', 'speed' → BS on answer.",mist:"Wrong feasible() direction; wrong initial lo/hi bounds.",practice:"LC 875 Koko Eating Bananas · LC 1011 Ship Within D Days · LC 410 Split Array Largest Sum",rev:"—",notes:"Ask: 'if answer X works, does X+1 also work?' If monotonic → BS on answer."},
   {n:10,t:"Sorting Algorithms",time:"1.5h",theory:"Merge sort (stable, O(n log n)), quicksort, counting sort. Custom Comparators in C++ (lambdas or functors for std::sort).",obs:"Sorting first often unlocks two-pointer / greedy / interval solutions.",mist:"Comparator logic reversed; integer overflow in comparisons (use safe subtraction).",practice:"LC 912 Sort an Array · LC 75 Sort Colors · LC 148 Sort List",rev:"—",notes:"Know how to write merge sort by hand; it appears as a sub-routine (count inversions)."},
   {n:11,t:"Recursion & Backtracking Basics",time:"1.5h",theory:"Recursion tree, base case, choose→explore→un-choose. Complexity of branching.",obs:"'All combinations / permutations / subsets' → backtracking.",mist:"Missing base case; not restoring state after recursion; shallow vs deep copy.",practice:"LC 78 Subsets · LC 46 Permutations · LC 39 Combination Sum",rev:"—",notes:"Draw the recursion tree before coding. Always."},
   {n:12,t:"More Backtracking",time:"1.5h",theory:"Pruning, ordering, dedup with sorted input + skip.",obs:"Constraint-satisfaction (board, grid, phone letters) → backtracking with pruning.",mist:"Not pruning → TLE; duplicate permutations from unsorted dedup.",practice:"LC 17 Letter Combinations · LC 90 Subsets II · LC 79 Word Search",rev:"—",notes:"Prune early; it's the difference between AC and TLE."},
   {n:13,t:"Stack",time:"1.5h",theory:"LIFO, Deque as stack. Balanced parens, expression eval, monotonic stack intro.",obs:"'Next greater/smaller', 'matching', 'undo', 'nesting' → stack.",mist:"Peeking an empty stack; forgetting to flush remaining elements.",practice:"LC 20 Valid Parentheses · LC 155 Min Stack · LC 739 Daily Temperatures",rev:"—",notes:"Monotonic stack: maintain increasing/decreasing invariant, pop while violated."},
   {n:14,t:"REVISION + Timed Set",time:"1.5h",theory:"First timed session: 3 mediums in 90 min.",obs:"Simulate interview pressure. Talk through approach aloud.",mist:"Jumping to code without stating approach + complexity.",practice:"Timed: LC 33 Search Rotated · LC 22 Generate Parentheses · LC 496 Next Greater I",rev:"Revise Week 1 (Days 1–7)",notes:"Checkpoint 2: binary search & backtracking templates memorized."},
 ]},
 {wk:3, theme:"Linked Lists, Queues, Intervals, Matrix", days:[
   {n:15,t:"Linked List I",time:"1.5h",theory:"Singly/doubly nodes, dummy head, reversal, fast/slow pointers.",obs:"'Reverse', 'middle', 'cycle', 'nth from end' → pointer manipulation, often fast/slow.",mist:"Losing the next pointer during reversal; null-pointer on empty list.",practice:"LC 206 Reverse List · LC 21 Merge Two Sorted · LC 141 Linked List Cycle",rev:"—",notes:"Always use a dummy node for list-building problems."},
   {n:16,t:"Linked List II",time:"1.5h",theory:"Cycle start (Floyd), reorder, merge k lists with heap, deep copy.",obs:"Complex re-pointing → draw it. K-lists → priority queue.",mist:"Off-by-one on 'nth from end'; forgetting to break the cycle when required.",practice:"LC 19 Remove Nth From End · LC 143 Reorder List · LC 23 Merge k Lists",rev:"—",notes:"Floyd's tortoise-and-hare finds both cycle existence and start."},
   {n:17,t:"Queue & Deque",time:"1.5h",theory:"FIFO, ArrayDeque, monotonic deque for sliding-window max.",obs:"'Max/min in every window of size k' → monotonic deque, O(n).",mist:"Using LinkedList when ArrayDeque is faster; not removing out-of-window indices.",practice:"LC 232 Queue via Stacks · LC 239 Sliding Window Maximum · LC 933 Recent Calls",rev:"—",notes:"Store indices (not values) in the deque so you can check the window."},
   {n:18,t:"Intervals",time:"1.5h",theory:"Sort by start, merge overlaps, sweep line, greedy on end times.",obs:"'Overlapping', 'merge', 'meeting rooms', 'insert interval' → sort + sweep.",mist:"Sorting by wrong key; using < vs <= incorrectly on touching intervals.",practice:"LC 56 Merge Intervals · LC 57 Insert Interval · LC 253 Meeting Rooms II",rev:"—",notes:"Meeting Rooms II = min-heap of end times, or two sorted arrays sweep."},
   {n:19,t:"Matrix / 2D Grids",time:"1.5h",theory:"Row/col traversal, spiral, rotate in place, direction arrays.",obs:"Grid + 'reach/spread/count regions' → BFS/DFS on cells.",mist:"Index (row,col) vs (x,y) confusion; not bounding checks before access.",practice:"LC 48 Rotate Image · LC 54 Spiral Matrix · LC 73 Set Matrix Zeroes",rev:"—",notes:"Keep a dirs = {{0,1},{1,0},{0,-1},{-1,0}} array; reuse everywhere."},
   {n:20,t:"Heap / Priority Queue",time:"1.5h",theory:"Binary heap, priority_queue in C++ (std::make_heap, std::push_heap, std::pop_heap), min vs max heap, top-K pattern.",obs:"'Top K', 'K closest', 'median', 'merge k' → heap.",mist:"Comparator direction inverted; keeping full heap when size-K suffices.",practice:"LC 215 Kth Largest · LC 347 Top K Frequent · LC 973 K Closest Points",rev:"—",notes:"Top-K largest → keep a MIN-heap of size K (counter-intuitive but correct)."},
   {n:21,t:"REVISION + Mock",time:"1.5h",theory:"First self-mock: pick 1 random medium, 35-min timer, narrate.",obs:"Record yourself. Note where you stalled.",mist:"Silent solving — interviewers can't score your thinking.",practice:"Re-solve hardest of Days 15–20 + 1 fresh medium under timer.",rev:"Revise Weeks 1–2",notes:"Checkpoint 3: linked-list & heap patterns fluent."},
 ]},
 {wk:4, theme:"Trees & BST", days:[
   {n:22,t:"Binary Tree Traversals",time:"1.5h",theory:"Pre/in/post-order (recursive + iterative), level-order BFS.",obs:"Tree problems reduce to 'what do I return up, what do I pass down?'",mist:"Confusing traversal order; forgetting null checks.",practice:"LC 94 Inorder · LC 102 Level Order · LC 144 Preorder",rev:"—",notes:"Inorder of a BST is sorted — a hugely useful fact."},
   {n:23,t:"Tree Recursion Patterns",time:"1.5h",theory:"Divide & conquer on trees, height, diameter, path sums.",obs:"'Max path', 'diameter', 'balanced' → post-order returning info to parent.",mist:"Global vs returned value confusion in diameter/path-sum.",practice:"LC 104 Max Depth · LC 110 Balanced · LC 543 Diameter",rev:"—",notes:"Return one thing, update a global for the other (diameter pattern)."},
   {n:24,t:"Tree Construction & LCA",time:"1.5h",theory:"Build from traversals, lowest common ancestor, serialize/deserialize.",obs:"'LCA' → recurse, return node when both sides found.",mist:"Index math errors in build-from-preorder+inorder.",practice:"LC 236 LCA · LC 105 Build from Pre+In · LC 297 Serialize/Deserialize",rev:"—",notes:"Serialize with preorder + null markers; deserialize with a queue."},
   {n:25,t:"Binary Search Tree",time:"1.5h",theory:"BST invariant, search/insert/delete, validate, kth smallest via inorder.",obs:"'Validate BST', 'kth smallest', 'range' → exploit inorder order.",mist:"Validating with node.val vs child only (need range bounds).",practice:"LC 98 Validate BST · LC 230 Kth Smallest · LC 235 LCA of BST",rev:"—",notes:"Validate BST by passing (min,max) bounds down, not comparing neighbors."},
   {n:26,t:"Trie (Prefix Tree)",time:"1.5h",theory:"26-way (or map) children, insert/search/startsWith, word dictionaries.",obs:"'Prefix', 'autocomplete', 'word dictionary', 'search with .' → Trie.",mist:"Forgetting isEnd flag; not handling wildcard with DFS.",practice:"LC 208 Implement Trie · LC 211 Add/Search Word · LC 212 Word Search II",rev:"—",notes:"Word Search II = Trie + backtracking on the grid."},
   {n:27,t:"Greedy",time:"1.5h",theory:"Local optimum → global optimum; exchange argument; sort-then-pick.",obs:"'Maximize/minimize with a simple rule', intervals, jumps → try greedy first.",mist:"Assuming greedy works without proof; missing counterexamples.",practice:"LC 55 Jump Game · LC 435 Non-overlapping Intervals · LC 621 Task Scheduler",rev:"—",notes:"If a counterexample exists → it's probably DP, not greedy."},
   {n:28,t:"REVISION + Timed Trees",time:"1.5h",theory:"3 tree mediums, 90 min.",obs:"Tree problems are ~20% of interviews — get fast here.",mist:"Not drawing the tree before coding.",practice:"Timed: LC 199 Right Side View · LC 114 Flatten · LC 108 Sorted Array to BST",rev:"Revise Weeks 1–3",notes:"Checkpoint 4: any standard tree problem in <20 min."},
 ]},
 {wk:5, theme:"Graphs", days:[
   {n:29,t:"Graph Representation + BFS/DFS",time:"1.5h",theory:"Adjacency list vs matrix, visited sets, BFS (shortest unweighted) vs DFS.",obs:"'Connected', 'reachable', 'islands', 'spread' → BFS/DFS.",mist:"Not marking visited on enqueue → duplicates & TLE.",practice:"LC 200 Number of Islands · LC 133 Clone Graph · LC 695 Max Area of Island",rev:"—",notes:"BFS gives shortest path in UNWEIGHTED graphs, free of charge."},
   {n:30,t:"Grid-as-Graph & Multi-source BFS",time:"1.5h",theory:"Cells as nodes, multi-source BFS (seed all sources at level 0).",obs:"'Rotting oranges', 'nearest 0', 'walls and gates' → multi-source BFS.",mist:"Single-source when multi-source is needed; time-step counting off by one.",practice:"LC 994 Rotting Oranges · LC 542 01 Matrix · LC 1091 Shortest Path in Binary Matrix",rev:"—",notes:"Multi-source = push all sources first, then BFS normally."},
   {n:31,t:"Topological Sort",time:"1.5h",theory:"DAGs, Kahn's algorithm (in-degree + queue), DFS-based ordering, cycle detection.",obs:"'Order with prerequisites/dependencies', 'course schedule' → topo sort.",mist:"Not detecting cycles → wrong 'possible' answer; wrong edge direction.",practice:"LC 207 Course Schedule · LC 210 Course Schedule II · LC 269 Alien Dictionary",rev:"—",notes:"If processed count < n → there's a cycle."},
   {n:32,t:"Union-Find (DSU)",time:"1.5h",theory:"find + union, path compression, union by rank, connected components.",obs:"'Are these connected?', 'number of groups', 'redundant edge', 'accounts merge' → DSU.",mist:"Forgetting path compression → slow; wrong parent init.",practice:"LC 547 Number of Provinces · LC 684 Redundant Connection · LC 323 Connected Components",rev:"—",notes:"DSU shines when edges arrive incrementally (online connectivity)."},
   {n:33,t:"Shortest Path — Dijkstra",time:"1.5h",theory:"Weighted non-negative graphs, PQ of (dist,node), relaxation.",obs:"'Cheapest/shortest with weights ≥ 0' → Dijkstra.",mist:"Revisiting settled nodes; using it with negative edges.",practice:"LC 743 Network Delay Time · LC 1631 Path With Min Effort · LC 787 Cheapest Flights K Stops",rev:"—",notes:"Skip a popped node if its dist is stale (> recorded)."},
   {n:34,t:"MST — Kruskal & Prim",time:"1.5h",theory:"Minimum spanning tree; Kruskal (sort edges + DSU), Prim (PQ).",obs:"'Connect all nodes at minimum total cost' → MST.",mist:"Adding an edge that forms a cycle (Kruskal); wrong stop condition.",practice:"LC 1584 Min Cost Connect Points · LC 1135 Connecting Cities · Kruskal drill",rev:"—",notes:"Kruskal = sort edges ascending, union if not already connected."},
   {n:35,t:"REVISION + Graph Mock",time:"1.5h",theory:"2 graph mediums + 1 hard read-through, timed.",obs:"Graphs are the highest-signal topic for senior interviews.",mist:"Choosing DFS when BFS (shortest) is required.",practice:"Timed: LC 417 Pacific Atlantic · LC 130 Surrounded Regions + review Dijkstra.",rev:"Revise Weeks 1–4",notes:"Checkpoint 5: BFS/DFS/topo/DSU/Dijkstra templates all memorized."},

"Binary Search":`int binarySearch(vector<int>& a, int target){
  int lo = 0, hi = a.size() - 1;
  while (lo <= hi){
    int mid = lo + (hi - lo) / 2;   // overflow-safe
    if (a[mid] == target) return mid;
    else if (a[mid] < target) lo = mid + 1;
    else hi = mid - 1;
  }
  return -1;   // not found
}

"BFS (graph)":`int bfs(vector<vector<int>>& adj, int start, int n){
  vector<bool> seen(n, false);
  queue<int> q;
  q.push(start); seen[start] = true;
  int level = 0;
  while (!q.empty()){
    int sz = q.size();
    for (int i = 0; i < sz; i++){
      int cur = q.front(); q.pop();
      for (int nx : adj[cur])
        if (!seen[nx]){ seen[nx] = true; q.push(nx); }
    }
    level++;                        // one BFS layer done
  }
  return level;
}`,
"Union-Find":`class DSU {
  vector<int> parent, rnk;
public:
  DSU(int n){ 
    parent.resize(n); rnk.assign(n, 0);
    for(int i = 0; i < n; i++) parent[i] = i; 
  }
  int find(int x){
    if(parent[x] != x) parent[x] = find(parent[x]); // path compression
    return parent[x];
  }
  bool unite(int a, int b){
    int ra = find(a), rb = find(b);
    if(ra == rb) return false;                      // already connected
    if(rnk[ra] < rnk[rb]) swap(ra, rb);
    parent[rb] = ra; 
    if(rnk[ra] == rnk[rb]) rnk[ra]++;
    return true;
  }
};`,
"Trie":`class Trie {
  struct TrieNode {
    TrieNode* child[26] = {};
    bool isEnd = false;
  };
  TrieNode* root;
public:
  Trie() { root = new TrieNode(); }
  void insert(string w){
    TrieNode* n = root;
    for(char c : w){
      int i = c - 'a';
      if(!n->child[i]) n->child[i] = new TrieNode();
      n = n->child[i];
    }
    n->isEnd = true;
  }
  bool search(string w){
    TrieNode* n = root;
    for(char c : w){
      int i = c - 'a';
      if(!n->child[i]) return false;
      n = n->child[i];
    }

  }
};`,

  int left = 0, best = 0;
  for(int right = 0; right < s.length(); right++){
    cnt[s[right]]++;
    while(/* window invalid */ cnt[s[right]] > 1){

"Backtracking":`void backtrack(int start, vector<int>& path,
               vector<int>& nums, vector<vector<int>>& res){
  res.push_back(path);              // record
  for(int i = start; i < nums.size(); i++){
    path.push_back(nums[i]);        // choose
    backtrack(i + 1, path, nums, res);  // explore
    path.pop_back();                // un-choose
  }
}`,
"DP (memo→table)":`// Top-down memoization
map<int, int> memo;
int dp(int i, vector<int>& a){
  if(i >= a.size()) return 0;
  if(memo.find(i) != memo.end()) return memo[i];
  int take = a[i] + dp(i + 2, a);
  int skip = dp(i + 1, a);
  return memo[i] = max(take, skip);
}

// Bottom-up table (House Robber)
int rob(vector<int>& a){
  int prev2 = 0, prev1 = 0;
  for(int x : a){
    int cur = max(prev1, prev2 + x);
    prev2 = prev1; prev1 = cur;
  }
  return prev1;
}`,

  DSU(int n){
    parent = new int[n]; rank = new int[n];
    for(int i = 0; i < n; i++) parent[i] = i;

// ---- IndexedDB persistence module ----
const DB_NAME = 'DSAHandbookDB';
const DB_VERSION = 1;
const STORE_NAME = 'progress';

let db = null;

// Initialize IndexedDB
function initDB(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onerror = () => { console.warn('IndexedDB not available, using memory'); resolve(null); };
    req.onsuccess = () => { db = req.result; resolve(db); };
    req.onupgradeneeded = (e) => {
      const database = e.target.result;
      if(!database.objectStoreNames.contains(STORE_NAME)){
        database.createObjectStore(STORE_NAME);
      }
    };
  });
}

// Load from IndexedDB
function loadFromDB(){
  return new Promise((resolve)=>{
    if(!db){ resolve({}); return; }
    const tx = db.transaction(STORE_NAME, 'readonly');
    const store = tx.objectStore(STORE_NAME);
    const req = store.get('state');
    req.onsuccess = () => resolve(req.result || {});
    req.onerror = () => resolve({});
  });
}

// Save to IndexedDB
function saveToDB(data){
  if(!db) return Promise.resolve();
  return new Promise((resolve)=>{
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    const req = store.put(data, 'state');
    req.onsuccess = () => resolve();
    req.onerror = () => resolve();
  });
}

// Clear all data
function clearDB(){
  if(!db) return Promise.resolve();
  return new Promise((resolve)=>{
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    const req = store.clear();
    req.onsuccess = () => resolve();
    req.onerror = () => resolve();
  });
}

// Synchronous wrappers for immediate use

function load(){return STATE;}

  saveToDB(STATE).catch(e=>console.log('Save failed:', e));

    const m=document.createElement('a');
    m.dataset.id=p.id; m.textContent=p.label; m.onclick=()=>go(p.id);

function go(id){
  const page=PAGES.find(p=>p.id===id);
  document.getElementById('pageTitle').textContent=page.label;
  document.querySelectorAll('#nav a, #mnav a').forEach(a=>a.classList.toggle('active',a.dataset.id===id));
  const c=document.getElementById('content');
  c.innerHTML=`<div class="page show" id="pg">${page.render()}</div>`;
  if(page.after) page.after();
  window.scrollTo(0,0);
  attachPageHandlers(id);
}

/* ---------------- DECISION TREE ---------------- */
function renderTree(){
  return `<div class="eyebrow">Part 4</div><div class="h-lead">Master Decision Tree</div>
  <p class="lead-txt">Read the problem, walk down this tree. Each branch is a question; each leaf is the pattern to reach for. Internalize it — by Day 60 you should run it in your head in seconds.</p>
  <div class="tree">
    <div class="tnode">
      <div class="tq">What is the core input / goal?</div>
      <div class="tbranch">
        <div class="tq">Array / String involved?</div>
        <div class="tbranch">
          <div class="tguard">Sorted (or sortable)?</div>
          <div class="tbranch">
            <div class="tguard">Need to find a value / boundary?</div> → <span class="tans">Binary Search</span><br>
            <div class="tguard">Need a pair / triplet?</div> → <span class="tans">Two Pointers</span>
          </div>
          <div class="tguard">Contiguous subarray/substring with a condition?</div> → <span class="tans">Sliding Window</span><br>
          <div class="tguard">Repeated range sums / "subarray = K"?</div> → <span class="tans">Prefix Sum</span><br>
          <div class="tguard">Frequency / seen-before / complement?</div> → <span class="tans">HashMap / HashSet</span><br>
          <div class="tguard">Nearest greater/smaller / matching / nesting?</div> → <span class="tans">Stack / Monotonic Stack</span>
        </div>
        <div class="tq">Need the K best / running min-max / median?</div> → <span class="tans">Heap / Priority Queue</span>
        <div class="tq">Must generate ALL combinations / permutations / subsets?</div> → <span class="tans">Backtracking</span>
        <div class="tq">Count ways / min-max cost with overlapping subproblems?</div> → <span class="tans">Dynamic Programming</span>
        <div class="tq">Tree structure?</div>
        <div class="tbranch">
          <div class="tguard">By level?</div> → <span class="tans">BFS (level order)</span><br>
          <div class="tguard">Path / height / subtree info?</div> → <span class="tans">DFS (post-order)</span><br>
          <div class="tguard">It's a BST?</div> → <span class="tans">Inorder / range-bound recursion</span>
        </div>
        <div class="tq">Graph / grid of relationships?</div>
        <div class="tbranch">
          <div class="tguard">Reach / count / spread?</div> → <span class="tans">BFS / DFS</span><br>
          <div class="tguard">Shortest path, unweighted?</div> → <span class="tans">BFS</span><br>
          <div class="tguard">Shortest path, weighted ≥ 0?</div> → <span class="tans">Dijkstra</span><br>
          <div class="tguard">Negative edges?</div> → <span class="tans">Bellman-Ford</span><br>
          <div class="tguard">Connectivity / merge groups (incremental)?</div> → <span class="tans">Union-Find</span><br>
          <div class="tguard">Prerequisites / ordering (directed)?</div> → <span class="tans">Topological Sort</span><br>
          <div class="tguard">Connect all nodes at min cost?</div> → <span class="tans">MST (Kruskal / Prim)</span>
        </div>
        <div class="tq">Prefix / autocomplete / word dictionary?</div> → <span class="tans">Trie</span>
        <div class="tq">Bit tricks / "without extra space" / subsets of small n?</div> → <span class="tans">Bit Manipulation</span>
      </div>
    </div>
  </div>
  <div class="card" style="margin-top:16px"><h3>How to actually use it</h3><p style="font-size:.9rem;color:var(--td-fg)">Don't guess randomly. Answer the branch questions honestly from the problem statement. If two leaves seem to fit, write the brute force first — the brute force usually reveals which structure removes the redundant work (that's your real answer).</p></div>`;
}

  }).join('');
  const totalSolved=topics.reduce((a,t)=>{const r=STATE.trk[t]||{};return a+(+r.e||0)+(+r.m||0)+(+r.h||0)},0);
  const t=totalDays(),d=doneDays(),pct=t?Math.round(d/t*100):0;
  const circ=2*Math.PI*50, off=circ*(1-pct/100);
  return `<div class="eyebrow">Part 10</div><div class="h-lead">Progress Tracker</div>
  <p class="lead-txt">Everything here saves to this device automatically. Log problems after each session; set confidence honestly. Export copies a Markdown version for Notion / Obsidian / GitHub.</p>
  <div class="dash-row">
    <svg class="ring" viewBox="0 0 120 120">
      <circle class="bg" cx="60" cy="60" r="50"></circle>
      <circle class="fg" cx="60" cy="60" r="50" stroke-dasharray="${circ}" stroke-dashoffset="${off}" transform="rotate(-90 60 60)"></circle>
      <text x="60" y="58" text-anchor="middle" font-family="var(--font-d)" font-size="22" font-weight="700" fill="var(--body-fg)">${pct}%</text>
      <text x="60" y="76" text-anchor="middle" font-size="9" fill="var(--slate)">roadmap</text>
    </svg>
    <div class="grid-3" style="flex:1">
      <div class="stat"><div class="n">${d}/${t}</div><div class="l">Days done</div></div>
      <div class="stat g"><div class="n">${totalSolved}</div><div class="l">Total solved</div></div>
      <div class="stat o"><div class="n">${topics.filter(x=>(+((STATE.trk[x]||{}).conf)||0)>=4).length}</div><div class="l">Topics mastered (4★+)</div></div>
    </div>
  </div>
  <div class="tracker-tools">
    <button class="btn" id="exportBtn">Export as Markdown</button>
    <button class="btn ghost" id="printBtn">Print</button>
    <button class="btn danger" id="resetBtn">Reset all data</button>
  </div>
  <div class="tbl-wrap"><table>
    <thead><tr><th>Topic</th><th>Theory</th><th>Easy</th><th>Med</th><th>Hard</th><th>Confidence</th><th>Weak areas / notes</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}
function buildMarkdown(){
  const topics=["Arrays","Strings","HashMap","Sliding Window","Two Pointer","Binary Search","Sorting","Stack","Queue","Linked List","Trees","BST","Heap","Trie","Backtracking","Greedy","Graphs","DP","Bit Manipulation","Prefix Sum","Intervals","Matrix","Union Find","Topological Sort","Shortest Path","Monotonic Stack"];
  let md=`# DSA Prep Tracker\n\nRoadmap: ${doneDays()}/${totalDays()} days done\n\n| Topic | Theory | Easy | Med | Hard | Confidence | Notes |\n|---|---|---|---|---|---|---|\n`;
  topics.forEach(t=>{const r=(STATE.trk||{})[t]||{};md+=`| ${t} | ${r.theory?'✅':'⬜'} | ${+r.e||0} | ${+r.m||0} | ${+r.h||0} | ${'★'.repeat(+r.conf||0)||'-'} | ${(r.note||'').replace(/\|/g,' ')} |\n`;});
  return md;
}

/* ---------------- CHECKLIST ---------------- */
function renderChecklist(){
  let items=CHECKLIST.map((c,i)=>`<li><input type="checkbox" class="cl-chk" data-i="${i}" ${(STATE.cl&&STATE.cl[i])?'checked':''}><div><b>${esc(c[0])}</b><br><span style="font-size:.85rem;color:var(--td-fg)">${esc(c[1])}</span></div></li>`).join('');
  return `<div class="eyebrow">Part 11</div><div class="h-lead">Final Interview Checklist</div>
  <p class="lead-txt">One page to run through the night before and morning of every coding interview. Tick each as you confirm you're ready.</p>
  <div class="card"><ul class="check-list">${items}</ul></div>
  <div class="grid-2" style="margin-top:4px">
   <div class="card" style="background:var(--green-card);border:1px solid var(--green-border)"><h3>2-minute warm-up</h3><p style="font-size:.9rem;color:var(--td-fg)">Solve one easy problem right before the interview to get your fingers and pattern-brain moving. Never go in cold.</p></div>
   <div class="card" style="background:var(--grape-card);border:1px solid var(--grape-border)"><h3>If you blank</h3><p style="font-size:.9rem;color:var(--td-fg)">State the brute force out loud. Then ask: what work is repeated? What structure removes it? That question alone unlocks most optimizations.</p></div>
  </div>`;
}

/* ---------------- HANDLERS ---------------- */
function attachPageHandlers(id){
  updateProgress();
  if(id==='roadmap'){
    document.querySelectorAll('.day-chk').forEach(cb=>cb.onchange=()=>{
      STATE.day=STATE.day||{}; STATE.day[cb.dataset.day]=cb.checked; save(); updateProgress();
    });
  }
  if(id==='questions'){
    const sel=document.getElementById('qsel');
    drawQuestions(+sel.value);
    sel.onchange=()=>drawQuestions(+sel.value);
  }
  if(id==='companies'){
    const sel=document.getElementById('csel');
    drawCompany(+sel.value);
    sel.onchange=()=>drawCompany(+sel.value);
  }
  if(id==='templates'){
    document.querySelectorAll('.lang-tab').forEach(t=>t.onclick=()=>{
      TMPL_LANG = t.dataset.lang;
      go('templates');
    });
    document.querySelectorAll('.tmpl-tab').forEach(t=>t.onclick=()=>{
      const i=t.dataset.i;
      document.querySelectorAll('.tmpl-tab').forEach(x=>x.classList.toggle('active',x.dataset.i===i));
      document.querySelectorAll('.tmpl-panel').forEach(x=>x.classList.toggle('show',x.dataset.i===i));
    });
    document.querySelectorAll('.copy-btn').forEach(b=>b.onclick=()=>{
      const names=Object.keys(TEMPLATES[TMPL_LANG]); const txt=TEMPLATES[TMPL_LANG][names[+b.dataset.copy]];
      navigator.clipboard.writeText(txt).then(()=>{b.textContent='Copied!';setTimeout(()=>b.textContent='Copy',1200)});
    });
  }
  if(id==='checklist'){
    document.querySelectorAll('.cl-chk').forEach(cb=>cb.onchange=()=>{
      STATE.cl=STATE.cl||{}; STATE.cl[cb.dataset.i]=cb.checked; save();
    });
  }
  if(id==='tracker'){
    const upd=(t,f,v)=>{STATE.trk=STATE.trk||{};STATE.trk[t]=STATE.trk[t]||{};STATE.trk[t][f]=v;save();};
    document.querySelectorAll('.trk-theory').forEach(c=>c.onchange=()=>upd(c.dataset.topic,'theory',c.checked));
    document.querySelectorAll('.trk-num').forEach(n=>n.onchange=()=>upd(n.dataset.topic,n.dataset.f,+n.value));
    document.querySelectorAll('.trk-note').forEach(n=>n.oninput=()=>upd(n.dataset.topic,'note',n.value));
    document.querySelectorAll('.conf-star').forEach(s=>s.onclick=()=>{
      upd(s.dataset.topic,'conf',+s.dataset.n); go('tracker');
    });
    document.getElementById('exportBtn').onclick=()=>{
      const md=buildMarkdown();
      navigator.clipboard.writeText(md).then(()=>{
        const b=document.getElementById('exportBtn');b.textContent='Copied to clipboard!';setTimeout(()=>b.textContent='Export as Markdown',1500);
      });
    };
    document.getElementById('printBtn').onclick=()=>window.print();
    document.getElementById('resetBtn').onclick=()=>{
      if(confirm('Erase all progress, tracker data, and checklists on this device?')){
        const keepTheme=STATE.theme; 
        STATE={theme:keepTheme}; 
        clearDB().then(()=>{
          save(); 
          go('tracker'); 
          updateProgress();
          alert('All progress data cleared.');
        });
      }
    };
  }
}

/* ---------------- BOOT ---------------- */
// Initialize IndexedDB and load persisted state
initDB().then(()=>{
  return loadFromDB();
}).then((data)=>{
  // Merge loaded data with STATE
  Object.assign(STATE, data);
  
  // default to system preference on first visit
  if(STATE.theme===undefined){
    STATE.theme = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
  }
  
  // Initialize UI
  buildNav();
  applyTheme();
  document.getElementById('themeToggle').onclick=toggleTheme;
  go('overview');
  updateProgress();
  
  // Show persistence status indicator
  if(db){
    const footer = document.querySelector('.footer');
    if(footer){
      footer.innerHTML += '<span style="margin-left:20px;font-size:.65rem;color:var(--slate)">💾 Auto-saving to device</span>';
    }
  }
}).catch(e=>console.log('Boot error:', e));
</script>
